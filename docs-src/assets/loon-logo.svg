<svg width="160" height="160" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <!-- 16x16 pixel loon - teal palette -->
  <!-- Background -->
  <rect x="0" y="0" width="16" height="16" fill="#e6f5f0"/>
  <!-- Body -->
  <rect x="1" y="10" width="2" height="2" fill="#0d4a3e"/>
  <rect x="3" y="9" width="2" height="3" fill="#0d4a3e"/>
  <rect x="5" y="8" width="2" height="4" fill="#0d4a3e"/>
  <rect x="7" y="9" width="2" height="3" fill="#0d4a3e"/>
  <rect x="9" y="10" width="1" height="2" fill="#0d4a3e"/>
  <!-- White chest -->
  <rect x="3" y="10" width="1" height="2" fill="white"/>
  <rect x="4" y="9" width="2" height="2" fill="white"/>
  <rect x="6" y="10" width="1" height="1" fill="white"/>
  <!-- Neck -->
  <rect x="8" y="7" width="2" height="2" fill="#0d4a3e"/>
  <rect x="9" y="5" width="2" height="2" fill="#0d4a3e"/>
  <!-- Head -->
  <rect x="10" y="3" width="3" height="3" fill="#0d4a3e"/>
  <!-- Eye -->
  <rect x="11" y="4" width="1" height="1" fill="#a7f3d0"/>
  <!-- Beak -->
  <rect x="13" y="4" width="2" height="1" fill="#d97706"/>
</svg>
